<html lang="he" dir="rtl">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<style>
:root {
  --cream: #FFF8EC;
  --cream-2: #FFEFD3;
  --ink: #2D1B4E;
  --ink-soft: #5C4A7E;
  --pink: #FF5C8A;
  --pink-deep: #E63E70;
  --yellow: #FFD23F;
  --yellow-deep: #F0B619;
  --blue: #5BA9F0;
  --blue-deep: #3B82C4;
  --green: #6BD96B;
  --green-deep: #4DBC4D;
  --orange: #FF8E3C;
  --purple: #9B5DE5;
  --shadow-pink: 0 8px 0 #E63E70;
  --shadow-yellow: 0 8px 0 #F0B619;
  --shadow-blue: 0 8px 0 #3B82C4;
  --shadow-green: 0 8px 0 #4DBC4D;
  --shadow-ink: 0 6px 0 #2D1B4E;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

html, body {
  height: 100%;
  overscroll-behavior: none;
}

body {
  font-family: "Heebo", system-ui, sans-serif;
  background: var(--cream);
  color: var(--ink);
  background-image:
    radial-gradient(circle at 20% 10%, rgba(255,210,63,.18) 0, transparent 30%),
    radial-gradient(circle at 80% 90%, rgba(91,169,240,.16) 0, transparent 35%),
    radial-gradient(circle at 50% 50%, rgba(255,92,138,.08) 0, transparent 60%);
  min-height: 100vh;
  user-select: none;
  -webkit-user-select: none;
}

body::before {
  content: "";
  position: fixed; inset: 0;
  background-image: radial-gradient(var(--ink) .8px, transparent .8px);
  background-size: 22px 22px;
  opacity: .04;
  pointer-events: none;
  z-index: 0;
}

#app {
  position: relative;
  z-index: 1;
  min-height: 100vh;
  max-width: 720px;
  margin: 0 auto;
  padding: 16px 16px calc(16px + env(safe-area-inset-bottom));
}

h1, h2, h3 {
  font-family: "Varela Round", system-ui, sans-serif;
  letter-spacing: -0.5px;
  line-height: 1.15;
}

h1 { font-size: clamp(28px, 7vw, 40px); }
h2 { font-size: clamp(22px, 5.5vw, 30px); }
h3 { font-size: clamp(18px, 4.5vw, 22px); }

.eng {
  font-family: "Fredoka", "Varela Round", sans-serif;
  font-weight: 700;
  letter-spacing: 0.2px;
}

/* ========== buttons ========== */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 14px 22px;
  font-family: "Varela Round", sans-serif;
  font-size: 18px;
  background: var(--pink);
  color: #fff;
  border: 3px solid var(--ink);
  border-radius: 18px;
  box-shadow: var(--shadow-pink);
  cursor: pointer;
  transition: transform .08s, box-shadow .08s;
  text-decoration: none;
  min-height: 52px;
}
.btn:active { transform: translateY(6px); box-shadow: 0 2px 0 var(--pink-deep); }
.btn.yellow { background: var(--yellow); color: var(--ink); box-shadow: var(--shadow-yellow); }
.btn.yellow:active { box-shadow: 0 2px 0 var(--yellow-deep); }
.btn.blue { background: var(--blue); box-shadow: var(--shadow-blue); }
.btn.blue:active { box-shadow: 0 2px 0 var(--blue-deep); }
.btn.green { background: var(--green); color: var(--ink); box-shadow: var(--shadow-green); }
.btn.green:active { box-shadow: 0 2px 0 var(--green-deep); }
.btn.ghost { background: #fff; color: var(--ink); box-shadow: var(--shadow-ink); }
.btn.ghost:active { box-shadow: 0 2px 0 var(--ink); }
.btn.lg { padding: 18px 28px; font-size: 22px; min-height: 64px; }
.btn.sm { padding: 8px 14px; font-size: 14px; min-height: 36px; box-shadow: 0 4px 0 var(--ink); }
.btn.sm:active { box-shadow: 0 1px 0 var(--ink); transform: translateY(3px); }
.btn.full { width: 100%; }

/* ========== cards ========== */
.card {
  background: #fff;
  border: 3px solid var(--ink);
  border-radius: 22px;
  padding: 18px;
  box-shadow: var(--shadow-ink);
  margin-bottom: 16px;
}
.card.pop {
  background: linear-gradient(180deg, #fff 60%, var(--cream-2) 100%);
}

/* ========== top bar ========== */
.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 18px;
  gap: 8px;
}
.topbar .who {
  display: flex; align-items: center; gap: 10px;
  background: #fff;
  border: 3px solid var(--ink);
  border-radius: 999px;
  padding: 6px 14px 6px 6px;
  box-shadow: 0 4px 0 var(--ink);
}
.topbar .who .av {
  width: 38px; height: 38px;
  border-radius: 50%;
  background: var(--yellow);
  display: flex; align-items: center; justify-content: center;
  font-size: 22px;
  border: 2px solid var(--ink);
}
.topbar .stars {
  background: var(--yellow);
  border: 3px solid var(--ink);
  border-radius: 999px;
  padding: 8px 14px;
  font-family: "Varela Round", sans-serif;
  box-shadow: 0 4px 0 var(--yellow-deep);
  font-size: 16px;
  font-weight: 700;
}

/* ========== profile selection ========== */
.welcome {
  text-align: center;
  padding: 30px 10px;
}
.welcome .big-emoji {
  font-size: 72px;
  display: inline-block;
  animation: wobble 2s ease-in-out infinite;
}
@keyframes wobble {
  0%, 100% { transform: rotate(-4deg); }
  50% { transform: rotate(4deg); }
}
.profile-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 14px;
  margin-top: 20px;
}
.profile-card {
  background: #fff;
  border: 3px solid var(--ink);
  border-radius: 22px;
  padding: 18px 12px;
  text-align: center;
  cursor: pointer;
  transition: transform .15s;
  box-shadow: var(--shadow-ink);
  position: relative;
}
.profile-card:active { transform: translateY(4px); box-shadow: 0 2px 0 var(--ink); }
.profile-card .av-big {
  width: 72px; height: 72px;
  border-radius: 50%;
  margin: 0 auto 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 38px;
  border: 3px solid var(--ink);
}
.profile-card .name {
  font-family: "Varela Round", sans-serif;
  font-size: 18px;
}
.profile-card .stars-mini {
  margin-top: 6px;
  font-size: 14px;
  color: var(--ink-soft);
}
.profile-card.add {
  background: var(--cream-2);
  border-style: dashed;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  min-height: 140px;
}
.profile-card.add .plus {
  font-size: 42px; color: var(--ink-soft);
  font-family: "Varela Round", sans-serif;
}

/* ========== home menu ========== */
.menu-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 14px;
  margin-top: 16px;
}
.menu-tile {
  display: flex;
  align-items: center;
  gap: 16px;
  background: #fff;
  border: 3px solid var(--ink);
  border-radius: 24px;
  padding: 20px;
  cursor: pointer;
  box-shadow: var(--shadow-ink);
  transition: transform .1s;
  text-align: right;
}
.menu-tile:active { transform: translateY(4px); box-shadow: 0 2px 0 var(--ink); }
.menu-tile.t-pink { background: linear-gradient(135deg, #fff 50%, #ffd6e2 100%); }
.menu-tile.t-blue { background: linear-gradient(135deg, #fff 50%, #cfe6fb 100%); }
.menu-tile.t-yellow { background: linear-gradient(135deg, #fff 50%, #fff0b3 100%); }
.menu-tile.t-green { background: linear-gradient(135deg, #fff 50%, #d6f5d6 100%); }
.menu-tile .icon {
  width: 64px; height: 64px;
  border-radius: 18px;
  background: var(--yellow);
  display: flex; align-items: center; justify-content: center;
  font-size: 34px;
  border: 3px solid var(--ink);
  flex-shrink: 0;
}
.menu-tile.t-pink .icon { background: var(--pink); }
.menu-tile.t-blue .icon { background: var(--blue); }
.menu-tile.t-yellow .icon { background: var(--yellow); }
.menu-tile.t-green .icon { background: var(--green); }
.menu-tile h3 { margin-bottom: 4px; }
.menu-tile p { color: var(--ink-soft); font-size: 14px; }

/* ========== back button ========== */
.back {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-family: "Varela Round", sans-serif;
  background: #fff;
  border: 3px solid var(--ink);
  border-radius: 999px;
  padding: 8px 16px;
  box-shadow: 0 4px 0 var(--ink);
  cursor: pointer;
  font-size: 15px;
  margin-bottom: 14px;
}
.back:active { transform: translateY(3px); box-shadow: 0 1px 0 var(--ink); }

/* ========== movies list ========== */
.movie-list { display: grid; gap: 12px; }
.movie-row {
  display: flex; align-items: center; gap: 12px;
  background: #fff;
  border: 3px solid var(--ink);
  border-radius: 18px;
  padding: 12px;
  box-shadow: 0 5px 0 var(--ink);
  cursor: pointer;
}
.movie-row:active { transform: translateY(3px); box-shadow: 0 2px 0 var(--ink); }
.movie-row .thumb {
  width: 56px; height: 56px;
  border-radius: 14px;
  background: var(--blue);
  border: 2px solid var(--ink);
  display: flex; align-items: center; justify-content: center;
  font-size: 28px;
  flex-shrink: 0;
}
.movie-row .meta { flex: 1; min-width: 0; }
.movie-row .meta .title {
  font-family: "Varela Round", sans-serif;
  font-size: 17px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.movie-row .meta .sub {
  font-size: 13px; color: var(--ink-soft);
}
.movie-row .actions { display: flex; gap: 4px; }

/* ========== video player ========== */
.video-wrap {
  position: relative;
  background: #000;
  border: 3px solid var(--ink);
  border-radius: 22px;
  overflow: hidden;
  box-shadow: var(--shadow-ink);
  margin-bottom: 14px;
}
.video-wrap video {
  width: 100%;
  display: block;
  background: #000;
  max-height: 70vh;
}

.player-info {
  background: #fff;
  border: 3px solid var(--ink);
  border-radius: 18px;
  padding: 14px;
  box-shadow: 0 5px 0 var(--ink);
  margin-bottom: 14px;
}
.player-info .pi-row {
  display: flex; justify-content: space-between; align-items: center;
  font-size: 14px; color: var(--ink-soft);
}
.player-info .pi-row strong { color: var(--ink); font-size: 16px; }

/* ========== quiz overlay ========== */
.overlay {
  position: fixed; inset: 0;
  background: rgba(45, 27, 78, 0.85);
  z-index: 100;
  display: flex; align-items: center; justify-content: center;
  padding: 16px;
  animation: fadeIn .25s;
}
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

.quiz-box {
  background: var(--cream);
  border: 4px solid var(--ink);
  border-radius: 26px;
  padding: 22px;
  width: 100%;
  max-width: 520px;
  box-shadow: 0 12px 0 var(--ink);
  animation: pop .35s cubic-bezier(.34,1.56,.64,1);
  max-height: 90vh;
  overflow-y: auto;
}
@keyframes pop {
  0% { transform: scale(.7); opacity: 0; }
  100% { transform: scale(1); opacity: 1; }
}
.quiz-box .q-label {
  display: inline-block;
  background: var(--yellow);
  border: 2px solid var(--ink);
  border-radius: 999px;
  padding: 4px 14px;
  font-family: "Varela Round", sans-serif;
  font-size: 14px;
  margin-bottom: 14px;
}
.quiz-box .q-word {
  font-family: "Fredoka", sans-serif;
  font-weight: 700;
  font-size: clamp(36px, 9vw, 56px);
  text-align: center;
  color: var(--pink);
  margin: 16px 0;
  direction: ltr;
  word-break: break-word;
}
.quiz-box .q-sentence {
  font-family: "Fredoka", sans-serif;
  font-size: clamp(22px, 5vw, 30px);
  text-align: center;
  color: var(--ink);
  background: #fff;
  border: 3px solid var(--ink);
  border-radius: 18px;
  padding: 16px;
  margin: 12px 0;
  direction: ltr;
}
.quiz-box .q-prompt {
  text-align: center;
  font-family: "Varela Round", sans-serif;
  font-size: 18px;
  color: var(--ink-soft);
  margin-bottom: 16px;
}
.q-options {
  display: grid;
  gap: 10px;
  margin-bottom: 14px;
}
.q-opt {
  background: #fff;
  border: 3px solid var(--ink);
  border-radius: 16px;
  padding: 14px;
  font-family: "Varela Round", sans-serif;
  font-size: 18px;
  cursor: pointer;
  text-align: center;
  box-shadow: 0 5px 0 var(--ink);
  transition: transform .1s, box-shadow .1s;
}
.q-opt:active { transform: translateY(3px); box-shadow: 0 2px 0 var(--ink); }
.q-opt.correct {
  background: var(--green);
  color: var(--ink);
  animation: pulse-correct .5s;
}
.q-opt.wrong {
  background: var(--pink);
  color: #fff;
  animation: shake .4s;
}
@keyframes pulse-correct {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.05); }
}
@keyframes shake {
  0%, 100% { transform: translateX(0); }
  25% { transform: translateX(-8px); }
  75% { transform: translateX(8px); }
}

.q-actions {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}
.q-actions .btn { flex: 1; }

.mic-btn {
  width: 100%;
  display: flex; align-items: center; justify-content: center; gap: 10px;
  background: var(--blue);
  color: #fff;
  border: 3px solid var(--ink);
  border-radius: 18px;
  padding: 14px;
  font-family: "Varela Round", sans-serif;
  font-size: 18px;
  cursor: pointer;
  box-shadow: var(--shadow-blue);
  margin-bottom: 10px;
}
.mic-btn:active { transform: translateY(4px); box-shadow: 0 4px 0 var(--blue-deep); }
.mic-btn.recording {
  background: var(--pink);
  box-shadow: var(--shadow-pink);
  animation: rec-pulse 1s infinite;
}
@keyframes rec-pulse {
  0%, 100% { box-shadow: 0 8px 0 var(--pink-deep), 0 0 0 0 rgba(255,92,138,.5); }
  50% { box-shadow: 0 8px 0 var(--pink-deep), 0 0 0 16px rgba(255,92,138,0); }
}
.mic-result {
  text-align: center;
  font-family: "Fredoka", sans-serif;
  font-size: 18px;
  margin-top: 8px;
  padding: 8px;
  background: #fff;
  border: 2px dashed var(--ink-soft);
  border-radius: 12px;
  min-height: 32px;
  direction: ltr;
}

/* ========== form fields ========== */
.field {
  display: block;
  margin-bottom: 12px;
}
.field label {
  display: block;
  font-family: "Varela Round", sans-serif;
  margin-bottom: 6px;
  font-size: 15px;
}
.field input, .field select, .field textarea {
  width: 100%;
  padding: 12px 14px;
  font-family: "Heebo", sans-serif;
  font-size: 16px;
  background: #fff;
  border: 3px solid var(--ink);
  border-radius: 14px;
  color: var(--ink);
  outline: none;
}
.field input:focus, .field select:focus { border-color: var(--pink); }
.field input.eng-input, .field textarea.eng-input { direction: ltr; font-family: "Fredoka", sans-serif; }
.field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

/* ========== vocab list ========== */
.vocab-row {
  display: flex; align-items: center; gap: 10px;
  background: #fff;
  border: 2px solid var(--ink);
  border-radius: 14px;
  padding: 10px 14px;
  margin-bottom: 8px;
  box-shadow: 0 3px 0 var(--ink);
}
.vocab-row .v-en {
  font-family: "Fredoka", sans-serif;
  font-weight: 700;
  font-size: 18px;
  color: var(--pink-deep);
  flex: 1;
  direction: ltr;
}
.vocab-row .v-arrow { color: var(--ink-soft); }
.vocab-row .v-he {
  flex: 1;
  text-align: right;
  font-size: 16px;
}
.vocab-row .v-del {
  background: none; border: none;
  font-size: 18px; cursor: pointer;
  color: var(--ink-soft);
  padding: 4px 8px;
}

/* ========== games ========== */
.game-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 12px;
}

/* match game */
.match-board {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 14px;
}
.match-col {
  display: flex; flex-direction: column; gap: 8px;
}
.match-card {
  background: #fff;
  border: 3px solid var(--ink);
  border-radius: 14px;
  padding: 14px 10px;
  cursor: pointer;
  text-align: center;
  font-family: "Varela Round", sans-serif;
  font-size: 16px;
  box-shadow: 0 4px 0 var(--ink);
  transition: transform .1s, box-shadow .1s, background .15s;
  min-height: 56px;
  display: flex; align-items: center; justify-content: center;
}
.match-card.eng {
  font-family: "Fredoka", sans-serif;
  direction: ltr;
  background: linear-gradient(180deg, #fff, #fff5e0);
}
.match-card:active { transform: translateY(2px); box-shadow: 0 2px 0 var(--ink); }
.match-card.selected {
  background: var(--yellow);
  transform: scale(1.04);
}
.match-card.matched {
  background: var(--green);
  color: #fff;
  pointer-events: none;
  opacity: .7;
}
.match-card.wrong { background: var(--pink); color: #fff; animation: shake .4s; }

/* listen game */
.listen-stage {
  text-align: center;
  padding: 20px 0 10px;
}
.listen-stage .big-speak {
  width: 110px; height: 110px;
  border-radius: 50%;
  background: var(--yellow);
  border: 4px solid var(--ink);
  font-size: 50px;
  cursor: pointer;
  box-shadow: 0 8px 0 var(--yellow-deep);
  margin-bottom: 14px;
  display: inline-flex; align-items: center; justify-content: center;
}
.listen-stage .big-speak:active { transform: translateY(4px); box-shadow: 0 4px 0 var(--yellow-deep); }
.listen-stage .hint {
  color: var(--ink-soft);
  font-family: "Varela Round", sans-serif;
}

/* speak game */
.speak-stage {
  text-align: center;
}
.speak-stage .target-he {
  font-family: "Varela Round", sans-serif;
  font-size: clamp(28px, 7vw, 40px);
  margin: 18px 0 8px;
  color: var(--ink);
}
.speak-stage .hint-en {
  font-family: "Fredoka", sans-serif;
  font-size: 16px;
  color: var(--ink-soft);
  direction: ltr;
  margin-bottom: 14px;
  letter-spacing: 4px;
  filter: blur(4px);
  transition: filter .3s;
  cursor: pointer;
}
.speak-stage .hint-en.show { filter: blur(0); }

/* progress bar */
.progress-bar {
  height: 14px;
  background: #fff;
  border: 2px solid var(--ink);
  border-radius: 999px;
  overflow: hidden;
  margin: 10px 0;
}
.progress-bar .fill {
  height: 100%;
  background: linear-gradient(90deg, var(--pink), var(--yellow));
  width: 0;
  transition: width .35s;
}

/* score chip */
.chips { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }
.chip {
  background: #fff;
  border: 2px solid var(--ink);
  border-radius: 999px;
  padding: 6px 14px;
  font-family: "Varela Round", sans-serif;
  font-size: 14px;
  box-shadow: 0 3px 0 var(--ink);
}
.chip.pink { background: var(--pink); color: #fff; }
.chip.green { background: var(--green); color: var(--ink); }
.chip.yellow { background: var(--yellow); }

/* confetti */
.confetti {
  position: fixed; pointer-events: none;
  z-index: 200; inset: 0;
  overflow: hidden;
}
.confetti span {
  position: absolute;
  font-size: 22px;
  animation: fall 1.4s linear forwards;
}
@keyframes fall {
  0% { transform: translateY(-30vh) rotate(0); opacity: 1; }
  100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
}

/* timestamps editor */
.ts-row {
  display: grid;
  grid-template-columns: 64px 1fr auto;
  gap: 8px;
  align-items: center;
  background: #fff;
  border: 2px solid var(--ink);
  border-radius: 12px;
  padding: 8px 10px;
  margin-bottom: 8px;
}
.ts-row .ts-time {
  font-family: "Fredoka", monospace;
  background: var(--yellow);
  border: 2px solid var(--ink);
  border-radius: 8px;
  padding: 4px 6px;
  text-align: center;
  font-size: 14px;
}
.ts-row .ts-text {
  font-size: 14px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

/* empty state */
.empty {
  text-align: center;
  padding: 30px 10px;
  color: var(--ink-soft);
}

/* ============== CLOUD CONFIG (saved per-device) ============== */
const CFG_KEY = 'eng_kids_cfg';

let cfg = {
  apiUrl: '',  // e.g. https://english-kids-api.bnayaav.workers.dev
  token: '',
  currentProfileId: null
};

function loadCfg() {
  try {
    const raw = localStorage.getItem(CFG_KEY);
    if (raw) Object.assign(cfg, JSON.parse(raw));
  } catch (e) {}
}

function saveCfg() {
  try { localStorage.setItem(CFG_KEY, JSON.stringify(cfg)); }
  catch (e) {}
}

let state = {
  profiles: [],
  vocab: [],
  movies: [],
  settings: { autoIntervalSec: 240, language: 'en-US' },
  screen: { name: 'setup', params: {} }
};

/* ============== API CLIENT ============== */
function apiUrl(path, params = {}) {
  const u = new URL(cfg.apiUrl.replace(/\/$/, '') + path);
  u.searchParams.set('t', cfg.token);
  for (const [k, v] of Object.entries(params)) {
    if (v !== undefined && v !== null) u.searchParams.set(k, v);
  }
  return u.toString();
}

async function api(path, opts = {}) {
  const url = apiUrl(path, opts.params || {});
  const init = { ...opts };
  delete init.params;
  init.headers = { ...(init.headers || {}), 'X-Auth': cfg.token };
  const resp = await fetch(url, init);
  if (!resp.ok) {
    let msg = 'HTTP ' + resp.status;
    try { msg = (await resp.json()).error || msg; } catch (e) {}
    throw new Error(msg);
  }
  const ct = resp.headers.get('Content-Type') || '';
  return ct.includes('json') ? resp.json() : resp;
}

async function testConnection(apiUrlVal, tokenVal) {
  // Test by calling /api/state with the new credentials
  const u = new URL(apiUrlVal.replace(/\/$/, '') + '/api/state');
  u.searchParams.set('t', tokenVal);
  const r = await fetch(u.toString(), { headers: { 'X-Auth': tokenVal } });
  if (r.status === 401) throw new Error('סיסמה שגויה');
  if (!r.ok) throw new Error('שגיאת שרת: ' + r.status);
  return r.json();
}

/* ============== STATE SAVE/LOAD via cloud ============== */
let saveTimer = null;
let lastSavePromise = Promise.resolve();

function save() {
  // Debounced save
  if (saveTimer) clearTimeout(saveTimer);
  saveTimer = setTimeout(() => {
    saveTimer = null;
    lastSavePromise = (async () => {
      try {
        await api('/api/state', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            profiles: state.profiles,
            vocab: state.vocab,
            movies: state.movies,
            settings: state.settings
          })
        });
      } catch (e) {
        console.warn('save fail', e);
        showToast('⚠️ שמירה נכשלה: ' + e.message);
      }
    })();
  }, 350);
}

async function load() {
  const data = await api('/api/state', { method: 'GET' });
  state.profiles = data.profiles || [];
  state.vocab = data.vocab || [];
  state.movies = data.movies || [];
  state.settings = data.settings || { autoIntervalSec: 240, language: 'en-US' };
  // Seed if empty
  if (state.vocab.length === 0) {
    state.vocab = SEED_VOCAB.map((v, i) => ({ id: 'seed_' + i, ...v }));

  }
}

function showToast(msg, ms = 2800) {
  const t = el('div', {
    style: {
      position: 'fixed', bottom: '20px', left: '50%', transform: 'translateX(-50%)',
      background: '#2D1B4E', color: '#fff', padding: '12px 20px',

      zIndex: '500', boxShadow: '0 6px 20px rgba(0,0,0,.3)', maxWidth: '90vw',
      animation: 'fadeIn .25s'
    }
  }, msg);
  document.body.appendChild(t);
  setTimeout(() => t.remove(), ms);
}

function fmtBytes(n) {
  if (!n && n !== 0) return '?';
  if (n < 1024) return n + ' B';
  if (n < 1024 * 1024) return (n / 1024).toFixed(0) + ' KB';
  if (n < 1024 * 1024 * 1024) return (n / (1024 * 1024)).toFixed(0) + ' MB';

}

  // split blocks by empty line
  const blocks = content.split(/\n\s*\n/);
  for (const block of blocks) {
    const lines = block.trim().split('\n');
    if (lines.length < 2) continue;
    // find timestamp line (00:00:00,000 --> 00:00:00,000)
    let tsLine = -1;
    for (let i = 0; i < lines.length; i++) {
      if (lines[i].includes('-->')) { tsLine = i; break; }
    }
    if (tsLine === -1) continue;
    const tsMatch = lines[tsLine].match(/(\d+):(\d+):(\d+)[,.](\d+)\s*-->\s*(\d+):(\d+):(\d+)[,.](\d+)/);
    if (!tsMatch) continue;
    const start = +tsMatch[1] * 3600 + +tsMatch[2] * 60 + +tsMatch[3] + +tsMatch[4] / 1000;
    const end = +tsMatch[5] * 3600 + +tsMatch[6] * 60 + +tsMatch[7] + +tsMatch[8] / 1000;
    // text is lines AFTER timestamp
    const text = lines.slice(tsLine + 1).join(' ')
      .replace(/<[^>]+>/g, '')      // strip html tags
      .replace(/\{[^}]+\}/g, '')    // strip ssa/ass tags
      .replace(/\s+/g, ' ')
      .trim();
    if (text) cues.push({ start, end, text });
  }
  return cues;
}

// Score word "challenge" - higher = better target. -1 means: skip this word
function scoreWord(word) {
  const lower = word.toLowerCase().replace(/[^a-z]/g, '');
  if (lower.length < 3) return -1;          // too short
  if (COMMON_WORDS.has(lower)) return -1;   // boring
  let score = lower.length;                  // longer = harder
  if (KIDS_DICT[lower]) score += 5;          // bonus if we have a translation
  if (/[A-Z]/.test(word) && word !== word.toUpperCase()) score -= 2; // proper noun likely
  return score;
}

// Pick the most challenging word from a sentence
function pickChallengeWord(text) {
  const words = text.match(/\b[a-zA-Z]+\b/g) || [];
  let best = null, bestScore = -1;
  for (const w of words) {
    const s = scoreWord(w);
    if (s > bestScore) { best = w; bestScore = s; }
  }
  return best;
}

// Lookup word in dictionary - tries forms
function dictLookup(word) {
  const lower = word.toLowerCase().replace(/[^a-z]/g, '');
  if (!lower) return null;
  if (KIDS_DICT[lower]) return KIDS_DICT[lower];
  // Try removing -s, -ed, -ing
  if (lower.endsWith('s') && KIDS_DICT[lower.slice(0, -1)]) return KIDS_DICT[lower.slice(0, -1)];
  if (lower.endsWith('ed') && KIDS_DICT[lower.slice(0, -2)]) return KIDS_DICT[lower.slice(0, -2)];
  if (lower.endsWith('ing') && KIDS_DICT[lower.slice(0, -3)]) return KIDS_DICT[lower.slice(0, -3)];
  if (lower.endsWith('ies') && KIDS_DICT[lower.slice(0, -3) + 'y']) return KIDS_DICT[lower.slice(0, -3) + 'y'];
  return null;
}

// Try to translate a full sentence to Hebrew. Returns null if translation is too poor.
function translateSentence(text) {
  if (!text) return null;
  const cleaned = text.toLowerCase().replace(/[.,!?;:"'\u201c\u201d]/g, '').trim();

  // 1. Exact phrase match
  if (COMMON_PHRASES_HE[cleaned]) return COMMON_PHRASES_HE[cleaned];

  // 2. Phrase contained in sentence?
  for (const phrase in COMMON_PHRASES_HE) {
    if (cleaned.includes(phrase)) {
      return COMMON_PHRASES_HE[phrase];
    }
  }

  // 3. Word-by-word translation - only if we know most of the words
  const words = cleaned.split(/\s+/).filter(Boolean);
  if (words.length === 0 || words.length > 12) return null;
  const translated = [];
  let knownCount = 0;
  for (const w of words) {
    let t = SIMPLE_WORDS_HE[w];
    if (t === undefined) t = dictLookup(w);
    if (t === undefined || t === null) {
      translated.push('?');
    } else {
      knownCount++;
      if (t) translated.push(t); // skip empty translations (filler words)
    }
  }
  // Need to know at least 70% of the words
  if (knownCount / words.length < 0.7) return null;
  return translated.join(' ');
}

// Get the word's exposure level for the current child profile (0=new, 1=familiar, 2=learning, 3=known)
function getWordLevel(word) {
  const p = getProfile();
  if (!p) return 0;
  p.wordLog = p.wordLog || {};
  const lower = word.toLowerCase().replace(/[^a-z]/g, '');
  if (!lower) return 0;
  return p.wordLog[lower]?.level || 0;
}

// Increment exposure for a word - bumps level after enough exposures
function bumpWordExposure(word, correct) {
  const p = getProfile();
  if (!p) return;
  p.wordLog = p.wordLog || {};
  const lower = word.toLowerCase().replace(/[^a-z]/g, '');
  if (!lower) return;
  const entry = p.wordLog[lower] || { level: 0, exposures: 0, correctAnswers: 0, lastSeen: null };
  entry.exposures = (entry.exposures || 0) + 1;
  if (correct) entry.correctAnswers = (entry.correctAnswers || 0) + 1;
  entry.lastSeen = Date.now();
  // Level-up rules:
  // 0→1: first exposure or "I understood" click
  // 1→2: 2 correct answers as level 1
  // 2→3: 2 correct answers as level 2
  if (correct) {
    if (entry.level === 0) entry.level = 1;
    else if (entry.level === 1 && (entry.correctAnswers || 0) >= 2) entry.level = 2;
    else if (entry.level === 2 && (entry.correctAnswers || 0) >= 4) entry.level = 3;
  }
  p.wordLog[lower] = entry;
  save();
}

// Translate all subtitle cues using Claude API via worker, in batches
async function translateSubtitles(movie, btn, infoEl) {
  const cues = movie.subtitles || [];
  // Filter cues that don't have heText yet
  const todo = [];
  for (let i = 0; i < cues.length; i++) {
    if (!cues[i].heText && cues[i].text && cues[i].text.length >= 2) {
      todo.push({ idx: i, text: cues[i].text });
    }
  }
  if (todo.length === 0) {
    if (confirm('כל הכתוביות כבר מתורגמות. לתרגם הכל מחדש?')) {
      cues.forEach(c => { delete c.heText; delete c.heWords; });
      save();
      return translateSubtitles(movie, btn, infoEl);
    }
    return;
  }
  const BATCH = 25;
  let done = 0;
  let failed = 0;
  const total = todo.length;

  // Build progress modal
  const modal = el('div', { class: 'overlay' });
  const modalBox = el('div', { class: 'card', style: { maxWidth: '380px', width: '100%' } });
  modalBox.appendChild(el('h3', { style: { textAlign: 'center' } }, '🤖 מתרגם כתוביות...'));
  const progLabel = el('p', { class: 'center', style: { marginBottom: '8px', fontFamily: '"Varela Round"' } }, '0 / ' + total);
  modalBox.appendChild(progLabel);
  const progTrack = el('div', { class: 'progress-bar' });
  const progFill = el('div', { class: 'fill', style: { width: '0%' } });
  progTrack.appendChild(progFill);
  modalBox.appendChild(progTrack);
  const progStatus = el('p', { class: 'muted center', style: { fontSize: '12px', marginTop: '8px' } }, 'מתחיל...');
  modalBox.appendChild(progStatus);
  let cancelled = false;
  const cancelBtn = el('button', { class: 'btn ghost full', style: { marginTop: '12px' }, onclick: () => { cancelled = true; } }, 'בטל');
  modalBox.appendChild(cancelBtn);
  modal.appendChild(modalBox);
  document.body.appendChild(modal);

  btn.setAttribute('disabled', 'disabled');
  btn.textContent = '⏳ מתרגם...';

  try {
    for (let start = 0; start < todo.length; start += BATCH) {
      if (cancelled) break;
      const batch = todo.slice(start, start + BATCH);
      progStatus.textContent = `שולח אצווה ${Math.floor(start / BATCH) + 1} מתוך ${Math.ceil(todo.length / BATCH)}...`;
      try {
        const resp = await api('/api/translate-batch', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ sentences: batch.map(b => b.text) })
        });
        // Apply translations
        if (resp.translations) {
          batch.forEach((b, i) => {
            const tr = resp.translations[i];
            if (tr && tr.he) {
              cues[b.idx].heText = tr.he;
              cues[b.idx].heWords = tr.words || {};
              done++;
            } else {
              failed++;
            }
          });
        }
        // Save progress incrementally - so a crash doesn't lose work
        save();
      } catch (e) {
        failed += batch.length;
        progStatus.textContent = '⚠️ שגיאה באצווה: ' + (e.message || e).slice(0, 50);
        // Continue with next batch
      }
      const completed = done + failed;
      progFill.style.width = ((completed / total) * 100) + '%';
      progLabel.textContent = `${completed} / ${total}`;
      // Tiny delay between batches to be nice to the API
      await new Promise(r => setTimeout(r, 200));
    }
  } finally {
    modal.remove();
    btn.removeAttribute('disabled');
    if (cancelled) {
      showToast('🛑 התרגום בוטל. ' + done + ' שורות תורגמו והושמרו');
    } else if (failed > 0) {
      showToast(`✓ ${done} שורות • ⚠️ ${failed} נכשלו`);
    } else {
      showToast(`✅ כל ${done} השורות תורגמו!`);
    }
    render();
  }
}

// Build a quiz from a subtitle cue. Returns one of: 'learn', 'reverse', 'cloze', 'translation'
// Type chosen based on the child's exposure level to the target word.
function buildQuizFromCue(cue, allCues) {
  const text = cue.text;
  if (!text || text.length < 6) return null;

  // PRIORITY 1: Use AI translations if we have them
  const aiHeSentence = cue.heText;
  const aiWords = cue.heWords || {};

  // Pick target word - prefer words that we have AI translations for!
  let word = null;
  if (Object.keys(aiWords).length > 0) {
    // Pick from AI-translated words, prefer ones with longer English
    const candidates = Object.keys(aiWords)
      .filter(w => w.length >= 3 && /^[a-zA-Z]+$/.test(w));
    if (candidates.length > 0) {
      // Prefer challenge words, but any word works
      const challengers = candidates.filter(w => !COMMON_WORDS.has(w.toLowerCase()));
      const pool = challengers.length > 0 ? challengers : candidates;
      word = pool[Math.floor(Math.random() * pool.length)];
    }
  }
  if (!word) {
    word = pickChallengeWord(text);
  }
  if (!word) {
    const words = (text.match(/\b[a-zA-Z]+\b/g) || []).filter(w => w.length >= 3);
    if (words.length === 0) return null;
    word = words[Math.floor(words.length / 2)];
  }

  // Get translation: prefer AI, fallback to dict
  const heWord = aiWords[word.toLowerCase()] || aiWords[word] || dictLookup(word);
  const heSentence = aiHeSentence || translateSentence(text);
  const wordLevel = getWordLevel(word);

  // Build distractors: prefer words with translations from AI
  const distractorWords = [];
  for (const c of allCues) {
    if (c === cue) continue;
    const cWords = c.heWords || {};
    for (const w of Object.keys(cWords)) {
      if (w.length < 3) continue;
      if (w.toLowerCase() === word.toLowerCase()) continue;
      distractorWords.push(w);
      if (distractorWords.length > 60) break;
    }
    if (distractorWords.length > 60) break;
  }
  // Fallback distractors from dict if not enough
  if (distractorWords.length < 10) {
    for (const c of allCues) {
      if (c === cue) continue;
      const cw = (c.text.match(/\b[a-zA-Z]+\b/g) || []);
      for (const w of cw) {
        if (w.length < 3) continue;
        if (w.toLowerCase() === word.toLowerCase()) continue;
        if (dictLookup(w)) distractorWords.push(w);
      }
    }
  }

  // ============================
  // LEVEL 0 — LEARN (no quiz, just expose)
  // Show sentence + Hebrew translation. Child clicks "I understood" → +1 pt.
  // ============================
  if (wordLevel === 0) {
    return {
      type: 'learn',
      sentence: text,
      word,
      heWord,
      heSentence,
      // Highlight the target word for visibility
      highlightedWord: word
    };
  }

  // ============================
  // LEVEL 1 — REVERSE (Hebrew → English, multiple choice)
  // "Which word means 'אוהב'?" — child picks English from 4 options
  // ============================
  if (wordLevel === 1 && heWord) {
    const distractors = shuffle(distractorWords).slice(0, 3);
    while (distractors.length < 3) distractors.push(['happy', 'house', 'water', 'good'][distractors.length]);
    return {
      type: 'reverse',
      sentence: text,
      word,
      heWord,
      heSentence,
      answer: word,
      options: shuffle([word, ...distractors])
    };
  }

  // ============================
  // LEVEL 2 — CLOZE (fill in the missing word)
  // ============================
  if (wordLevel === 2) {
    const blanked = text.replace(new RegExp('\\b' + word + '\\b'), '____');
    const distractors = shuffle(distractorWords).slice(0, 3);
    while (distractors.length < 3) distractors.push(['quickly', 'always', 'never', 'maybe', 'really'][distractors.length]);
    return {
      type: 'cloze',
      sentence: text,
      blanked,
      answer: word,
      word,
      heWord,
      heSentence,
      options: shuffle([word, ...distractors])
    };
  }

  // ============================
  // LEVEL 3+ — TRANSLATION (English → Hebrew, hardest)
  // ============================
  if (wordLevel >= 3 && heWord) {
    const allTrans = Object.values(KIDS_DICT);
    const distractors = shuffle(allTrans.filter(t => t !== heWord)).slice(0, 3);
    return {
      type: 'translation',
      sentence: text,
      word,
      answer: heWord,
      options: shuffle([heWord, ...distractors])
    };
  }

  // Fallback if level 1/3 reached without translation - downgrade to cloze
  const blanked = text.replace(new RegExp('\\b' + word + '\\b'), '____');
  const distractors = shuffle(distractorWords).slice(0, 3);
  while (distractors.length < 3) distractors.push(['quickly', 'always', 'never', 'maybe'][distractors.length]);
  return {
    type: 'cloze',
    sentence: text,
    blanked,
    answer: word,
    word,
    heWord,
    heSentence,
    options: shuffle([word, ...distractors])
  };
}

/* =========================================================================
   HELPERS
   ========================================================================= */
function uid() { return 'id_' + Math.random().toString(36).slice(2, 10); }
function el(tag, attrs = {}, ...kids) {
  const e = document.createElement(tag);
  for (const [k, v] of Object.entries(attrs)) {
    if (k === 'class') e.className = v;
    else if (k === 'html') e.innerHTML = v;
    else if (k.startsWith('on')) e.addEventListener(k.slice(2), v);
    else if (k === 'style' && typeof v === 'object') Object.assign(e.style, v);
    else if (v !== null && v !== undefined) e.setAttribute(k, v);
  }
  for (const k of kids.flat()) {
    if (k === null || k === undefined || k === false) continue;
    if (typeof k === 'string' || typeof k === 'number') e.appendChild(document.createTextNode(k));
    else e.appendChild(k);
  }
  return e;
}
function fmtTime(sec) {
  sec = Math.floor(sec);
  const h = Math.floor(sec / 3600);
  const m = Math.floor((sec % 3600) / 60);
  const s = sec % 60;
  if (h > 0) return `${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  return `${m}:${String(s).padStart(2,'0')}`;
}
function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}
function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
function getProfile() { return state.profiles.find(p => p.id === cfg.currentProfileId); }

/* =========================================================================
   PROGRESSION SYSTEM - levels, points, daily screen time rewards
   ========================================================================= */

// Time per level in minutes (cumulative within day)
const LEVEL_REWARDS = [0, 5, 12, 20, 30, 35, 40, 45, 50];  // index = level
function levelRewardMinutes(level) {
  if (level <= 0) return 0;
  if (level < LEVEL_REWARDS.length) return LEVEL_REWARDS[level];
  return 50 + (level - 8) * 5; // continue pattern after level 8
}

const POINTS_PER_LEVEL = 20;
const MAX_DAILY_MINUTES = 30;

function todayKey() {
  const d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
}

// Returns difficulty score 1-3 for a word (or sentence)
function difficultyFor(word) {
  if (!word) return 1;
  const lower = word.toLowerCase().replace(/[^a-z]/g, '');
  if (lower.length === 0) return 1;
  if (COMMON_WORDS.has(lower)) return 1;
  if (lower.length < 5) return 1;
  if (lower.length < 8) return 2;
  return 3;
}

function ensureProfileProgress(p) {
  if (!p.progression) {
    p.progression = {
      level: 1,
      pointsInLevel: 0,
      totalPoints: 0,
      screenTime: { date: todayKey(), earnedToday: 0 },
      levelUpHistory: []
    };
  }
  // Reset daily counter if new day
  const today = todayKey();
  if (p.progression.screenTime.date !== today) {
    p.progression.screenTime = { date: today, earnedToday: 0 };
  }
}

// Award points - returns { points, leveledUp, newLevel, minutesAdded }
function awardPoints(opts = {}) {
  const p = getProfile();
  if (!p) return null;
  ensureProfileProgress(p);

  let points = opts.basePoints || 1;
  if (opts.fastAnswer) points += 1;
  if (opts.voiceAnswer) points += 1;

  const before = p.progression.level;
  p.progression.totalPoints += points;
  p.progression.pointsInLevel += points;

  // Legacy stars - keep updated for backward compat (display)
  p.stars = (p.stars || 0) + points;

  let leveledUp = false;
  let minutesAdded = 0;
  while (p.progression.pointsInLevel >= POINTS_PER_LEVEL) {
    p.progression.pointsInLevel -= POINTS_PER_LEVEL;
    p.progression.level += 1;
    leveledUp = true;
    p.progression.levelUpHistory = p.progression.levelUpHistory || [];
    p.progression.levelUpHistory.push({ level: p.progression.level, date: new Date().toISOString() });

    // Add minutes for this new level (capped daily at MAX_DAILY_MINUTES)
    const minsForThisLevel = levelRewardMinutes(p.progression.level);
    const room = Math.max(0, MAX_DAILY_MINUTES - p.progression.screenTime.earnedToday);
    const add = Math.min(minsForThisLevel, room);
    if (add > 0) {
      p.progression.screenTime.earnedToday += add;
      minutesAdded += add;
    }
  }

  // legacy stats
  p.stats = p.stats || { questionsAnswered: 0, correct: 0 };
  save();
  return {
    points,
    leveledUp,
    newLevel: p.progression.level,
    minutesAdded,
    pointsInLevel: p.progression.pointsInLevel,
    earnedToday: p.progression.screenTime.earnedToday
  };
}

// Compatibility shim - old code can still call awardStars(n)
// Now also shows points popup and animates progress bar
function awardStars(n, opts = {}) {
  const result = awardPoints({ basePoints: n, ...opts });
  if (!result) return;
  // Show "+N" popup near the source button if provided
  showPointsPopup(result.points, opts.sourceEl);
  // Pulse the progress bar
  pulseProgressBar();
  // Level up?
  if (result.leveledUp) {
    setTimeout(() => bigCelebration(result.newLevel, result.minutesAdded), 500);
  }
  return result;
}

function showPointsPopup(points, sourceEl) {
  const popup = el('div', { class: 'points-popup' }, '+' + points + ' ⭐');
  let x = window.innerWidth / 2;
  let y = window.innerHeight / 2;
  if (sourceEl && sourceEl.getBoundingClientRect) {
    const r = sourceEl.getBoundingClientRect();
    x = r.left + r.width / 2;
    y = r.top + r.height / 2;
  }
  popup.style.left = (x - 30) + 'px';
  popup.style.top = y + 'px';
  document.body.appendChild(popup);
  setTimeout(() => popup.remove(), 1300);
}

function pulseProgressBar() {
  const fill = document.getElementById('progFill');
  if (!fill) return;
  const p = getProfile();
  if (!p) return;
  const pct = (p.progression.pointsInLevel / POINTS_PER_LEVEL) * 100;
  fill.style.width = pct + '%';
  fill.classList.remove('pulse');
  void fill.offsetWidth;
  fill.classList.add('pulse');
  // also update header counts inline
  const wrap = fill.closest('.prog-wrap');
  if (wrap) {
    const badge = wrap.querySelector('.prog-level-badge');
    if (badge) badge.textContent = '🌟 שלב ' + p.progression.level;
    const counts = wrap.querySelector('.prog-row span:nth-child(2)');
    if (counts) counts.textContent = p.progression.pointsInLevel + '/' + POINTS_PER_LEVEL + ' נק׳';
    const stFill = wrap.querySelector('.screentime-fill');
    const stLabel = wrap.querySelector('.prog-screentime span:nth-child(2)');
    if (stFill) stFill.style.width = Math.min(100, (p.progression.screenTime.earnedToday / MAX_DAILY_MINUTES) * 100) + '%';
    if (stLabel) stLabel.textContent = p.progression.screenTime.earnedToday + ' / ' + MAX_DAILY_MINUTES + ' דק׳ היום';
  }
  // also legacy stars badge
  const starsBadge = document.querySelector('.topbar .stars');
  if (starsBadge) starsBadge.textContent = '⭐ ' + (p.stars || 0);
}

function recordAnswer(correct) {
  const p = getProfile();
  if (!p) return;
  p.stats = p.stats || { questionsAnswered: 0, correct: 0 };
  p.stats.questionsAnswered++;
  if (correct) p.stats.correct++;
  save();
}

/* speech */
function speak(text, lang = 'en-US') {
  if (!('speechSynthesis' in window)) return;
  try {
    speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = lang;
    u.rate = 0.9;
    u.pitch = 1.05;
    speechSynthesis.speak(u);
  } catch (e) { console.warn(e); }
}

function listen(onResult, onEnd, lang = 'en-US') {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) {
    alert('הדפדפן הזה לא תומך בדיבור. נסה Chrome.');
    return null;
  }
  const r = new SR();
  r.lang = lang;
  r.continuous = false;
  r.interimResults = true;
  r.maxAlternatives = 3;
  let finalTranscript = '';
  r.onresult = (e) => {
    let interim = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      const t = e.results[i][0].transcript;
      if (e.results[i].isFinal) finalTranscript += t;
      else interim += t;
    }
    onResult(finalTranscript || interim, !!finalTranscript);
  };
  r.onend = () => onEnd(finalTranscript);
  r.onerror = (e) => { console.warn('SR err', e); onEnd(finalTranscript); };
  try { r.start(); } catch (e) { console.warn(e); }
  return r;
}

function normalizeEn(s) {
  return (s || '').toLowerCase().trim().replace(/[^\w\s]/g, '').replace(/\s+/g, ' ');
}

    formCard.appendChild(el('p', { class: 'muted', style: { fontSize: '13px', marginBottom: '10px' } },
      uploadMode === 'multipart'
        ? 'הקובץ מתחלק לחתיכות של 20MB. אפשר לבטל באמצע.'
        : 'הקובץ נשלח בבת אחת. מתאים עד ~100MB.'
    ));

    formCard.appendChild(el('div', { class: 'field' },
      el('label', {}, 'שם הסרט'),
      el('input', { id: 'mname', type: 'text', value: name, placeholder: 'למשל: פרוזן', oninput: (e) => name = e.target.value })
    ));

    formCard.appendChild(el('div', { class: 'field' },
      el('label', {}, 'הפסקה לשאלה כל (דקות)'),
      el('input', { type: 'number', min: '1', max: '30', value: interval, oninput: (e) => interval = parseInt(e.target.value) || 4 })
    ));

    }, uploadMode === 'multipart' ? '🚀 התחל העלאה' : '⚡ העלה');

  function onFilePicked(file) {
    if (!file) return;
    pickedFile = file;
    if (!name && file.name) {
      name = file.name.replace(/\.[^.]+$/, '');
      const inp = document.getElementById('mname');
      if (inp) inp.value = name;
    }
    const sizeMB = file.size / (1024 * 1024);
    let warn = '';
    if (uploadMode === 'direct' && sizeMB > 100) {
      warn = ' ⚠️ קובץ גדול מ-100MB - השתמש ב"העלאה גדולה"';
    }
    const prev = document.getElementById('filePreview');
    if (prev) {
      prev.innerHTML = '';
      prev.appendChild(el('div', { class: 'card', style: { background: '#F0FFF0', padding: '10px', margin: 0 } },
        el('p', { style: { fontSize: '14px' } }, '✅ ', el('strong', { class: 'eng', style: { direction: 'ltr', display: 'inline-block' } }, file.name)),
        el('p', { class: 'muted', style: { fontSize: '12px' } }, 'גודל: ' + fmtBytes(file.size) + warn)
      ));
    }
  }

  async function getDuration(file) {
    return new Promise((res) => {
      const v = document.createElement('video');
      v.preload = 'metadata';
      const url = URL.createObjectURL(file);
      const t = setTimeout(() => { URL.revokeObjectURL(url); res(0); }, 15000);
      v.onloadedmetadata = () => { clearTimeout(t); URL.revokeObjectURL(url); res(v.duration || 0); };
      v.onerror = () => { clearTimeout(t); URL.revokeObjectURL(url); res(0); };
      v.src = url;
    });
  }

  function setProgress(pct, label) {
    const fill = document.getElementById('progFill');
    const lab = document.getElementById('progLabel');
    const box = document.getElementById('progBox');
    if (box) box.classList.remove('hide');
    if (fill) fill.style.width = pct + '%';
    if (lab && label !== undefined) lab.textContent = label;
  }

  function doAbort() {
    abortFlag.cancelled = true;
    if (xhrRef) { try { xhrRef.abort(); } catch (e) {} }
  }

  async function doUpload() {
    if (!name.trim()) return alert('נא להזין שם');
    if (!pickedFile) return alert('נא לבחור קובץ');

    const upBtn = document.getElementById('uploadBtn');
    const abBtn = document.getElementById('abortBtn');
    upBtn.setAttribute('disabled', 'disabled');
    upBtn.textContent = '⏳ מעלה...';
    abBtn.classList.remove('hide');
    abortFlag = { cancelled: false };

    try {
      setProgress(2, '🎬 קורא מטא-דאטה...');
      const dur = await getDuration(pickedFile);

      let movieId;
      if (uploadMode === 'multipart') {
        movieId = await uploadMultipart(pickedFile, name.trim(), interval * 60, dur);
      } else {
        movieId = await uploadDirect(pickedFile, name.trim(), interval * 60, dur);
      }

      setProgress(100, '✓ הועלה בהצלחה!');
      showToast('✅ הסרט הועלה');
      // refresh state from server to pick up the new movie
      await load();
      setTimeout(() => nav('movies'), 600);
    } catch (e) {
      setProgress(0, '');
      document.getElementById('progBox')?.classList.add('hide');
      upBtn.removeAttribute('disabled');
      upBtn.textContent = uploadMode === 'multipart' ? '🚀 התחל העלאה' : '⚡ העלה';
      abBtn.classList.add('hide');
      alert('❌ ' + (e.message || e));
    }
  }

  async function uploadDirect(file, mname, autoSec, duration) {
    return new Promise((resolve, reject) => {
      const params = new URLSearchParams({
        t: cfg.token,
        fileName: file.name,
        name: mname,
        autoIntervalSec: autoSec,
        duration: duration
      });
      const xhr = new XMLHttpRequest();
      xhrRef = xhr;
      xhr.open('PUT', cfg.apiUrl.replace(/\/$/, '') + '/api/upload/direct?' + params.toString());
      xhr.setRequestHeader('Content-Type', file.type || 'video/mp4');
      xhr.setRequestHeader('X-Auth', cfg.token);
      xhr.upload.onprogress = (e) => {
        if (e.lengthComputable) {
          const pct = (e.loaded / e.total) * 100;
          setProgress(pct, `📤 ${fmtBytes(e.loaded)} / ${fmtBytes(e.total)}`);
        }
      };
      xhr.onload = () => {
        xhrRef = null;
        if (xhr.status >= 200 && xhr.status < 300) {
          try { resolve(JSON.parse(xhr.responseText).movieId); }
          catch (e) { reject(new Error('תשובה לא תקינה מהשרת')); }
        } else {
          reject(new Error('HTTP ' + xhr.status + ' - ' + (xhr.responseText || '').slice(0, 200)));
        }
      };
      xhr.onerror = () => { xhrRef = null; reject(new Error('שגיאת רשת')); };
      xhr.onabort = () => { xhrRef = null; reject(new Error('ההעלאה בוטלה')); };
      xhr.send(file);
    });
  }

  async function uploadMultipart(file, mname, autoSec, duration) {
    setProgress(3, '🚀 מאתחל העלאה...');
    const initResp = await api('/api/upload/init', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        fileName: file.name, fileSize: file.size, mimeType: file.type || 'video/mp4',
        name: mname, autoIntervalSec: autoSec, duration
      })
    });
    const { movieId, uploadId, partSize } = initResp;
    const numParts = Math.ceil(file.size / partSize);
    const parts = [];

    for (let i = 0; i < numParts; i++) {
      if (abortFlag.cancelled) {
        await api('/api/upload/abort', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ movieId, uploadId })
        }).catch(() => {});
        throw new Error('ההעלאה בוטלה');
      }
      const start = i * partSize;
      const end = Math.min(start + partSize, file.size);
      const blob = file.slice(start, end);
      const partNumber = i + 1;

      setProgress(5 + (90 * (i / numParts)), `📤 חלק ${partNumber}/${numParts} (${fmtBytes(end)} / ${fmtBytes(file.size)})`);

      // retry per part
      let lastErr;
      for (let attempt = 0; attempt < 3; attempt++) {
        if (abortFlag.cancelled) break;
        try {
          const r = await fetch(apiUrl('/api/upload/part', { movieId, uploadId, partNumber }), {
            method: 'PUT',
            headers: { 'X-Auth': cfg.token },
            body: blob
          });
          if (!r.ok) {
            const txt = await r.text();
            throw new Error('חלק ' + partNumber + ': ' + r.status + ' ' + txt.slice(0, 100));
          }
          const j = await r.json();
          parts.push({ partNumber: j.partNumber, etag: j.etag });
          lastErr = null;
          break;
        } catch (e) {
          lastErr = e;
          if (attempt < 2) await new Promise(rs => setTimeout(rs, 1500 * (attempt + 1)));
        }
      }
      if (lastErr) {
        await api('/api/upload/abort', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ movieId, uploadId })
        }).catch(() => {});
        throw lastErr;
      }
    }

    setProgress(98, '🏁 משלים העלאה...');
    await api('/api/upload/complete', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ movieId, uploadId, parts })
    });
    return movieId;
  }

  return wrap;
};

      dynBox.appendChild(el('div', { class: 'field' },

        el('input', { type: 'text', placeholder: 'תני לזה ללכת!', oninput: (e) => customHe = e.target.value })
      ));

function stopPlayerCtx() {
  if (playerCtx?.video?.src) {
    try { URL.revokeObjectURL(playerCtx.video.src); } catch(e) {}
  }
  playerCtx = null;
}

function setupPlayerCtx(video, movie) {
  const auto = movie.autoIntervalSec || state.settings.autoIntervalSec;
  const customQs = (movie.customQuestions || []).slice().sort((a,b) => a.time - b.time);
  const subtitles = movie.subtitles || [];

  // build "due" map: timestamps where to ask. Fired ones tracked
  let nextAutoAt = auto;
  const firedCustom = new Set();
  const firedSubtitles = new Set(); // by index, so we don't repeat the same line

  playerCtx = { video, movie };

  video.addEventListener('timeupdate', () => {
    if (!video.paused && !document.body.querySelector('.overlay')) {
      const t = video.currentTime;
      // custom question?
      for (const q of customQs) {
        const key = q.time + '_' + (q.vocabId || q.custom?.en);
        if (!firedCustom.has(key) && t >= q.time && t < q.time + 1.5) {
          firedCustom.add(key);
          triggerQuiz(q);
          return;
        }
      }
      // auto question?
      if (t >= nextAutoAt) {
        nextAutoAt = t + auto;
        // PRIORITY 1: subtitle-based question (from already-watched cues)
        if (subtitles.length > 0) {
          // Get watched cues that we haven't used yet
          const candidates = [];
          for (let i = 0; i < subtitles.length; i++) {
            if (firedSubtitles.has(i)) continue;
            const c = subtitles[i];
            if (c.start < t && c.text && c.text.length >= 12) {
              candidates.push({ idx: i, cue: c });
            }
          }
          // Prefer recent ones (last 3 minutes of watched content)
          const recent = candidates.filter(x => t - x.cue.start < 180);
          const pool = recent.length > 0 ? recent : candidates;
          // Try a few until we get a valid quiz
          let attempts = 0;
          while (pool.length > 0 && attempts < 5) {
            const idx = Math.floor(Math.random() * pool.length);
            const pick = pool.splice(idx, 1)[0];
            const quiz = buildQuizFromCue(pick.cue, subtitles);
            if (quiz) {
              firedSubtitles.add(pick.idx);
              quiz.cue = pick.cue; // pass cue for frame capture
              triggerQuiz({ subtitleQuiz: quiz, time: t });
              return;
            }
            attempts++;
          }
        }
        // FALLBACK: random vocab from bank
        if (state.vocab.length > 0) {
          triggerQuiz({ vocabId: pick(state.vocab).id, time: t });
        }
      }
    }
  });

  async function triggerQuiz(q) {
    video.pause();
    let frameDataUrl = null;
    // If we have a cue with timestamp, capture that exact frame
    if (q.subtitleQuiz && q.subtitleQuiz.cue) {
      try {
        frameDataUrl = await captureFrameAt(video, q.subtitleQuiz.cue);
      } catch (e) {
        console.warn('frame capture failed', e);
      }
    } else {
      // Fallback: capture current frame
      try { frameDataUrl = captureCurrentFrame(video); } catch (e) {}
    }
    if (q.subtitleQuiz) q.subtitleQuiz.frameImage = frameDataUrl;
    else q.frameImage = frameDataUrl;
    showQuiz(q, () => {
      try { video.play(); } catch (e) {}
    });
  }
}

// Captures the current video frame to a data URL
function captureCurrentFrame(video) {
  if (!video || video.readyState < 2) return null;
  const w = Math.min(640, video.videoWidth || 640);
  const h = video.videoHeight ? Math.round(video.videoHeight * (w / video.videoWidth)) : 360;
  const canvas = document.createElement('canvas');
  canvas.width = w; canvas.height = h;
  const ctx = canvas.getContext('2d');
  try {
    ctx.drawImage(video, 0, 0, w, h);
    return canvas.toDataURL('image/jpeg', 0.7);
  } catch (e) {
    // CORS / tainted - can't capture
    return null;
  }
}

// Seek to cue mid-time, capture frame, then return to original time
function captureFrameAt(video, cue) {
  return new Promise((resolve) => {
    const originalTime = video.currentTime;
    const targetTime = (cue.start + cue.end) / 2; // middle of the cue
    let timeout = null;
    const onSeeked = () => {
      video.removeEventListener('seeked', onSeeked);
      if (timeout) clearTimeout(timeout);
      // wait one frame for the image to render
      requestAnimationFrame(() => {
        const img = captureCurrentFrame(video);
        // restore original time silently
        try { video.currentTime = originalTime; } catch (e) {}
        resolve(img);
      });
    };
    video.addEventListener('seeked', onSeeked);
    // safety timeout - if seeking takes too long, give up gracefully
    timeout = setTimeout(() => {
      video.removeEventListener('seeked', onSeeked);
      // capture whatever we have and restore
      const img = captureCurrentFrame(video);
      try { video.currentTime = originalTime; } catch (e) {}
      resolve(img);
    }, 1500);
    try { video.currentTime = targetTime; } catch (e) {
      video.removeEventListener('seeked', onSeeked);
      if (timeout) clearTimeout(timeout);
      resolve(null);
    }
  });
}

/* =========================================================================
   QUIZ OVERLAY - core mechanic
   ========================================================================= */
function showQuiz(q, onClose) {
  // ============= SUBTITLE-BASED QUIZ (cloze or translation) =============
  if (q.subtitleQuiz) {
    return showSubtitleQuiz(q.subtitleQuiz, onClose);
  }

  // ============= CLASSIC vocab/custom quiz =============
  let en, he, isPhrase = false;
  if (q.vocabId) {
    const v = state.vocab.find(x => x.id === q.vocabId);
    if (!v) { onClose(); return; }
    en = v.en; he = v.he;
    isPhrase = en.split(' ').length > 1;
  } else if (q.custom) {
    en = q.custom.en; he = q.custom.he;
    isPhrase = en.split(' ').length > 1;
  } else { onClose(); return; }

  const overlay = el('div', { class: 'overlay' });
  const box = el('div', { class: 'quiz-box' });

  box.appendChild(el('div', { class: 'q-label' }, isPhrase ? '🎯 משפט' : '✨ מילה'));

  // Frame image from the current moment in the movie
  if (q.frameImage) {
    const imgWrap = el('div', { class: 'quiz-frame-wrap' },
      el('img', { class: 'quiz-frame', src: q.frameImage })
    );
    box.appendChild(imgWrap);
  }

  const target = isPhrase
    ? el('div', { class: 'q-sentence' }, en)
    : el('div', { class: 'q-word' }, en);
  box.appendChild(target);

  // play button (TTS)
  const playBtn = el('button', { class: 'btn yellow sm', style: { display: 'block', margin: '0 auto 14px' }, onclick: () => speak(en, 'en-US') }, '🔊 שמע שוב');
  box.appendChild(playBtn);
  setTimeout(() => speak(en, 'en-US'), 350);

  box.appendChild(el('div', { class: 'q-prompt' }, 'מה הפירוש בעברית?'));

  // build distractors from other vocab he meanings
  const distractors = shuffle(state.vocab.filter(v => v.he !== he)).slice(0, 3).map(v => v.he);
  const allOptions = shuffle([he, ...distractors]);

  const optsBox = el('div', { class: 'q-options' });
  let answered = false;

  const startTime = Date.now();
  allOptions.forEach(opt => {
    const optEl = el('div', { class: 'q-opt', onclick: () => {
      if (answered) return;
      answered = true;
      const correct = opt === he;
      if (correct) {
        optEl.classList.add('correct');
        recordAnswer(true);
        const elapsed = (Date.now() - startTime) / 1000;
        const fast = elapsed < 5;
        const base = difficultyFor(en);
        awardStars(base, { fastAnswer: fast, sourceEl: optEl });
        confetti();
        const p = getProfile();
        if (p && q.vocabId) {
          p.mistakes = (p.mistakes || []).filter(x => x !== q.vocabId);
          save();
        }
        setTimeout(() => { overlay.remove(); onClose(); }, 1100);
      } else {
        optEl.classList.add('wrong');
        recordAnswer(false);
        setTimeout(() => {
          optsBox.querySelectorAll('.q-opt').forEach(o => {
            if (o.textContent === he) o.classList.add('correct');
          });
        }, 300);
        const p = getProfile();
        if (p && q.vocabId) {
          p.mistakes = p.mistakes || [];
          if (!p.mistakes.includes(q.vocabId)) p.mistakes.push(q.vocabId);
          save();
        }
        setTimeout(() => {
          actions.querySelector('.btn-continue').classList.remove('hide');
        }, 600);
      }
    } }, opt);
    optsBox.appendChild(optEl);
  });
  box.appendChild(optsBox);

  // mic option
  const micBtn = el('button', { class: 'mic-btn' }, '🎤 או דברו: אמרו את התרגום באנגלית בקול');
  const micResult = el('div', { class: 'mic-result' });
  let micRec = null;
  micBtn.addEventListener('click', () => {
    if (micRec) { try { micRec.stop(); } catch(e){} micRec = null; micBtn.classList.remove('recording'); return; }
    micBtn.classList.add('recording');
    micResult.textContent = 'מקשיב...';
    micRec = listen((text, final) => {
      micResult.textContent = text;
      if (final) {
        const said = normalizeEn(text);
        const want = normalizeEn(en);
        if (said.includes(want) || want.includes(said)) {
          if (!answered) {
            answered = true;
            optsBox.querySelectorAll('.q-opt').forEach(o => { if (o.textContent === he) o.classList.add('correct'); });
            recordAnswer(true);
            const base = difficultyFor(en);
            awardStars(base, { voiceAnswer: true, sourceEl: micBtn });
            confetti();
            setTimeout(() => { overlay.remove(); onClose(); }, 1200);
          }
        }
      }
    }, () => { micBtn.classList.remove('recording'); micRec = null; }, 'en-US');
  });
  box.appendChild(micBtn);
  box.appendChild(micResult);

  const actions = el('div', { class: 'q-actions', style: { marginTop: '14px' } });
  actions.appendChild(el('button', { class: 'btn ghost btn-continue hide', onclick: () => { overlay.remove(); onClose(); } }, 'המשך'));
  actions.appendChild(el('button', { class: 'btn ghost', onclick: () => { overlay.remove(); onClose(); } }, '⏭️ דלג'));
  box.appendChild(actions);

  overlay.appendChild(box);
  document.body.appendChild(overlay);
}

// Quiz from subtitle (sentence from movie itself)
function showSubtitleQuiz(quiz, onClose) {
  const overlay = el('div', { class: 'overlay' });
  const box = el('div', { class: 'quiz-box' });

  // ============== LEARN MODE - just expose, no quiz ==============
  if (quiz.type === 'learn') {
    return showLearnCard(quiz, onClose);
  }

  // Header label
  const labels = {
    'reverse': '🇮🇱 איך אומרים באנגלית?',
    'cloze': '📝 השלם את המשפט',
    'translation': '🇬🇧 מה זה אומר?'
  };
  box.appendChild(el('div', { class: 'q-label' }, labels[quiz.type] || '🎬 שמעת בסרט'));

  // Frame image
  if (quiz.frameImage) {
    box.appendChild(el('div', { class: 'quiz-frame-wrap' },
      el('img', { class: 'quiz-frame', src: quiz.frameImage })
    ));
  }

  // The sentence display - depends on type
  if (quiz.type === 'reverse') {
    // Show Hebrew sentence + emphasize the Hebrew word the child needs to translate
    if (quiz.heSentence) {
      box.appendChild(el('div', { class: 'q-he-sentence' }, quiz.heSentence));
    }
    box.appendChild(el('div', { class: 'q-he-target' }, '"' + quiz.heWord + '"'));
  } else if (quiz.type === 'cloze') {
    box.appendChild(el('div', { class: 'q-sentence', style: { direction: 'ltr' } }, quiz.blanked));
  } else {
    // translation - show full English sentence
    box.appendChild(el('div', { class: 'q-sentence', style: { direction: 'ltr' } }, quiz.sentence));
    box.appendChild(el('div', { class: 'q-word', style: { fontSize: '32px', marginTop: '6px' } }, quiz.word));
  }

  // 🔊 Listen button - always shows English audio of the sentence
  const playBtn = el('button', {
    class: 'btn yellow sm',
    style: { display: 'block', margin: '0 auto 12px' },
    onclick: () => speak(quiz.sentence, 'en-US')
  }, '🔊 שמע באנגלית');
  box.appendChild(playBtn);
  // Auto-speak when shown (only for non-reverse - reverse asks them to think)
  if (quiz.type !== 'reverse') {
    setTimeout(() => speak(quiz.sentence, 'en-US'), 350);
  }

  // Prompt
  const prompts = {
    'reverse': 'איזו מילה זאת באנגלית?',
    'cloze': 'איזו מילה חסרה?',
    'translation': 'מה משמעות המילה?'
  };
  box.appendChild(el('div', { class: 'q-prompt' }, prompts[quiz.type] || ''));

  // Options
  const optsBox = el('div', { class: 'q-options' });
  let answered = false;

  const startTime = Date.now();
  // Direction of options text - English options need ltr, Hebrew need rtl
  const optsLtr = (quiz.type === 'cloze' || quiz.type === 'reverse');

  quiz.options.forEach(opt => {
    const optEl = el('div', {
      class: 'q-opt',
      style: optsLtr ? { direction: 'ltr', fontFamily: '"Fredoka", sans-serif' } : {},
      onclick: () => {
        if (answered) return;
        answered = true;
        const correct = opt === quiz.answer;
        if (correct) {
          optEl.classList.add('correct');
          recordAnswer(true);
          bumpWordExposure(quiz.word, true);
          const elapsed = (Date.now() - startTime) / 1000;
          const fast = elapsed < 5;
          // Points by type: easier types give more (encourages level-up to harder)
          const pointsByType = { reverse: 2, cloze: 3, translation: 1 };
          const base = pointsByType[quiz.type] || 2;
          awardStars(base, { fastAnswer: fast, sourceEl: optEl });
          confetti();
          setTimeout(() => { overlay.remove(); onClose(); }, 1100);
        } else {
          optEl.classList.add('wrong');
          recordAnswer(false);
          // Don't bump exposure on wrong - they need more practice at this level
          setTimeout(() => {
            optsBox.querySelectorAll('.q-opt').forEach(o => {
              if (o.textContent === quiz.answer) o.classList.add('correct');
            });
          }, 300);
          setTimeout(() => {
            actions.querySelector('.btn-continue').classList.remove('hide');
          }, 600);
        }
      }
    }, opt);
    optsBox.appendChild(optEl);
  });
  box.appendChild(optsBox);

  // Hints based on type
  if (quiz.type === 'cloze' && quiz.heWord) {
    box.appendChild(el('p', { class: 'hint' },
      '💡 רמז: המילה החסרה משמעותה "' + quiz.heWord + '"'
    ));
  }
  if (quiz.type === 'translation' && quiz.heSentence) {
    // Show full sentence translation as a hint reveal
    const hintBtn = el('button', {
      class: 'btn ghost sm',
      style: { display: 'block', margin: '8px auto' },
      onclick: () => {
        hintBtn.style.display = 'none';
        const hint = el('p', { class: 'hint' },
          '🇮🇱 כל המשפט אומר: "' + quiz.heSentence + '"'
        );
        box.insertBefore(hint, optsBox.nextSibling);
      }
    }, '💡 רמז');
    box.appendChild(hintBtn);
  }

  const actions = el('div', { class: 'q-actions', style: { marginTop: '14px' } });
  actions.appendChild(el('button', { class: 'btn ghost btn-continue hide', onclick: () => { overlay.remove(); onClose(); } }, 'המשך'));
  actions.appendChild(el('button', { class: 'btn ghost', onclick: () => { overlay.remove(); onClose(); } }, '⏭️ דלג'));
  box.appendChild(actions);

  overlay.appendChild(box);
  document.body.appendChild(overlay);
}

// LEARN CARD - for words seen for the very first time
function showLearnCard(quiz, onClose) {
  const overlay = el('div', { class: 'overlay' });
  const box = el('div', { class: 'quiz-box learn-card' });

  // Header
  box.appendChild(el('div', { class: 'q-label q-label-learn' }, '📚 מילה חדשה!'));

  // Frame image from movie
  if (quiz.frameImage) {
    box.appendChild(el('div', { class: 'quiz-frame-wrap' },
      el('img', { class: 'quiz-frame', src: quiz.frameImage })
    ));
  }

  // The English sentence with the target word highlighted
  const sentenceEl = el('div', { class: 'q-sentence', style: { direction: 'ltr', textAlign: 'center' } });
  if (quiz.highlightedWord) {
    const re = new RegExp('(\\b' + quiz.highlightedWord + '\\b)', 'i');
    const parts = quiz.sentence.split(re);
    parts.forEach(part => {
      if (re.test(part)) {
        sentenceEl.appendChild(el('span', { class: 'highlight-word' }, part));
      } else {
        sentenceEl.appendChild(document.createTextNode(part));
      }
    });
  } else {
    sentenceEl.textContent = quiz.sentence;
  }
  box.appendChild(sentenceEl);

  // Hebrew sentence translation (the most important!)
  if (quiz.heSentence) {
    box.appendChild(el('div', { class: 'q-he-sentence learn-translation' },
      '🇮🇱 ' + quiz.heSentence
    ));
  }

  // Word focus + translation
  const focusBox = el('div', { class: 'word-focus' },
    el('div', { class: 'word-focus-en' }, quiz.word),
    el('div', { class: 'word-focus-arrow' }, '↔'),
    el('div', { class: 'word-focus-he' }, quiz.heWord || '?')
  );
  box.appendChild(focusBox);

  // Listen buttons
  const audioRow = el('div', { class: 'audio-row' });
  audioRow.appendChild(el('button', {
    class: 'btn yellow sm',
    onclick: () => speak(quiz.word, 'en-US')
  }, '🔊 ' + quiz.word));
  audioRow.appendChild(el('button', {
    class: 'btn blue sm',
    onclick: () => speak(quiz.sentence, 'en-US')
  }, '🎬 כל המשפט'));
  box.appendChild(audioRow);

  // Auto-speak the sentence on open
  setTimeout(() => speak(quiz.sentence, 'en-US'), 400);
  setTimeout(() => speak(quiz.word, 'en-US'), 1800);

  // Got it button
  const gotItBtn = el('button', {
    class: 'btn green full',
    style: { marginTop: '14px', fontSize: '20px' },
    onclick: () => {
      bumpWordExposure(quiz.word, true);  // promote 0 → 1
      awardStars(1, { sourceEl: gotItBtn });
      confetti();
      setTimeout(() => { overlay.remove(); onClose(); }, 800);
    }
  }, 'הבנתי! 👍');
  box.appendChild(gotItBtn);

  // Skip option (no points, no exposure bump)
  box.appendChild(el('button', {
    class: 'btn ghost full',
    style: { marginTop: '8px', fontSize: '13px' },
    onclick: () => { overlay.remove(); onClose(); }
  }, '⏭️ עוד פעם בפעם הבאה'));

  overlay.appendChild(box);
  document.body.appendChild(overlay);
}

/* ----- match game ----- */
SCREENS['game-match'] = () => {
  const wrap = el('div');
  wrap.appendChild(topBar());
  wrap.appendChild(backBtn(() => nav('games')));
  wrap.appendChild(el('h2', {}, '🎯 התאמה'));
  wrap.appendChild(el('p', { class: 'muted' }, 'הקש על מילה באנגלית, ואז על התרגום הנכון'));

  const ROUND_SIZE = 5;
  const round = shuffle(state.vocab).slice(0, ROUND_SIZE);
  const enList = shuffle(round.map(v => ({ id: v.id, text: v.en })));
  const heList = shuffle(round.map(v => ({ id: v.id, text: v.he })));
  let selected = null;
  let matchedCount = 0;
  let mistakes = 0;

  const chips = el('div', { class: 'chips' },
    el('div', { class: 'chip green' }, '✓ ' + matchedCount + '/' + ROUND_SIZE),
    el('div', { class: 'chip pink' }, '✗ ' + mistakes)
  );
  wrap.appendChild(chips);

  function updateChips() {
    chips.innerHTML = '';
    chips.appendChild(el('div', { class: 'chip green' }, '✓ ' + matchedCount + '/' + ROUND_SIZE));
    chips.appendChild(el('div', { class: 'chip pink' }, '✗ ' + mistakes));
  }

  const board = el('div', { class: 'match-board' });
  const colEn = el('div', { class: 'match-col' });
  const colHe = el('div', { class: 'match-col' });

  enList.forEach(item => {
    const c = el('div', { class: 'match-card eng', 'data-id': item.id, 'data-side': 'en', onclick: () => onPick(c, item, 'en') }, item.text);
    colEn.appendChild(c);
  });
  heList.forEach(item => {
    const c = el('div', { class: 'match-card', 'data-id': item.id, 'data-side': 'he', onclick: () => onPick(c, item, 'he') }, item.text);
    colHe.appendChild(c);
  });

  board.appendChild(colEn);
  board.appendChild(colHe);
  wrap.appendChild(board);

  function onPick(cardEl, item, side) {
    if (cardEl.classList.contains('matched')) return;
    if (!selected) {
      selected = { cardEl, item, side };
      cardEl.classList.add('selected');
      if (side === 'en') speak(item.text, 'en-US');
      return;
    }
    if (selected.side === side) {
      // switching selection on same side
      selected.cardEl.classList.remove('selected');
      selected = { cardEl, item, side };
      cardEl.classList.add('selected');
      if (side === 'en') speak(item.text, 'en-US');
      return;
    }
    // matched check
    if (selected.item.id === item.id) {
      cardEl.classList.add('matched');
      selected.cardEl.classList.remove('selected');
      selected.cardEl.classList.add('matched');
      matchedCount++;
      awardStars(1);
      recordAnswer(true);
      updateChips();
      const p = getProfile();
      if (p) {
        p.mistakes = (p.mistakes || []).filter(x => x !== item.id);
        save();
      }
      if (matchedCount === ROUND_SIZE) {
        setTimeout(() => {
          confetti();
          awardStars(3);
          setTimeout(() => { if (confirm('סיימת את הסיבוב! לסיבוב חדש?')) nav('game-match'); else nav('games'); }, 800);
        }, 400);
      }
      selected = null;
    } else {
      cardEl.classList.add('wrong');
      selected.cardEl.classList.add('wrong');
      mistakes++;
      recordAnswer(false);
      const p = getProfile();
      if (p) {
        p.mistakes = p.mistakes || [];
        if (!p.mistakes.includes(item.id)) p.mistakes.push(item.id);
        if (!p.mistakes.includes(selected.item.id)) p.mistakes.push(selected.item.id);
        save();
      }
      const sel = selected;
      selected = null;
      setTimeout(() => {
        cardEl.classList.remove('wrong');
        sel.cardEl.classList.remove('wrong', 'selected');
        updateChips();
      }, 700);
    }
  }

  return wrap;
};

/* ----- listen game ----- */
SCREENS['game-listen'] = () => {
  const wrap = el('div');
  wrap.appendChild(topBar());
  wrap.appendChild(backBtn(() => nav('games')));
  wrap.appendChild(el('h2', {}, '🔊 שמע ובחר'));

  const stage = el('div', { class: 'card pop' });
  const stageInner = el('div', { class: 'listen-stage' });
  let current = null;
  let answered = false;

  const speakerBtn = el('button', { class: 'big-speak' }, '🔊');
  const optsBox = el('div', { class: 'q-options' });

  function nextRound() {
    answered = false;
    current = pick(state.vocab);
    const distractors = shuffle(state.vocab.filter(v => v.id !== current.id)).slice(0, 3);
    const opts = shuffle([current, ...distractors]);

    optsBox.innerHTML = '';
    opts.forEach(v => {
      const o = el('div', { class: 'q-opt', onclick: () => {
        if (answered) return;
        answered = true;
        const correct = v.id === current.id;
        if (correct) {
          o.classList.add('correct');
          awardStars(2);
          recordAnswer(true);
          confetti();
          const p = getProfile();
          if (p) { p.mistakes = (p.mistakes || []).filter(x => x !== current.id); save(); }
          setTimeout(nextRound, 900);
        } else {
          o.classList.add('wrong');
          recordAnswer(false);
          optsBox.querySelectorAll('.q-opt').forEach(x => { if (x.textContent === current.he) x.classList.add('correct'); });
          const p = getProfile();
          if (p) { p.mistakes = p.mistakes || []; if (!p.mistakes.includes(current.id)) p.mistakes.push(current.id); save(); }
          setTimeout(nextRound, 1500);
        }
      } }, v.he);
      optsBox.appendChild(o);
    });

    setTimeout(() => speak(current.en, 'en-US'), 200);
  }

  speakerBtn.addEventListener('click', () => { if (current) speak(current.en, 'en-US'); });

  stageInner.appendChild(speakerBtn);
  stageInner.appendChild(el('p', { class: 'hint' }, 'הקש כדי לשמוע שוב'));
  stage.appendChild(stageInner);
  stage.appendChild(optsBox);
  wrap.appendChild(stage);

  nextRound();
  return wrap;
};

/* ----- speak game ----- */
SCREENS['game-speak'] = () => {
  const wrap = el('div');
  wrap.appendChild(topBar());
  wrap.appendChild(backBtn(() => nav('games')));
  wrap.appendChild(el('h2', {}, '🎤 אמור באנגלית'));

  const stage = el('div', { class: 'card pop' });
  const stageInner = el('div', { class: 'speak-stage' });
  stage.appendChild(stageInner);
  wrap.appendChild(stage);

  let current = null;
  let answered = false;
  let micRec = null;

  function nextRound() {
    stageInner.innerHTML = '';
    answered = false;
    current = pick(state.vocab);

    stageInner.appendChild(el('div', { class: 'q-label' }, 'אמור באנגלית את:'));
    stageInner.appendChild(el('div', { class: 'target-he' }, current.he));

    const hintEn = el('div', { class: 'hint-en', onclick: () => hintEn.classList.toggle('show') }, current.en);
    stageInner.appendChild(hintEn);
    stageInner.appendChild(el('p', { class: 'hint', style: { fontSize: '12px' } }, '(הקש על המעורפל לרמז)'));

    const micBtn = el('button', { class: 'mic-btn', style: { marginTop: '14px' } }, '🎤 התחל לדבר');
    const micResult = el('div', { class: 'mic-result' });

    micBtn.addEventListener('click', () => {
      if (micRec) { try { micRec.stop(); } catch(e){} micRec = null; micBtn.classList.remove('recording'); return; }
      micBtn.classList.add('recording');
      micResult.textContent = 'מקשיב...';
      micRec = listen((text, final) => {
        micResult.textContent = text;
        if (final && !answered) {
          const said = normalizeEn(text);
          const want = normalizeEn(current.en);
          if (said.includes(want) || want.includes(said)) {
            answered = true;
            micResult.style.background = '#6BD96B';
            micResult.style.color = '#fff';
            awardStars(3);
            recordAnswer(true);
            confetti();
            const p = getProfile();
            if (p) { p.mistakes = (p.mistakes || []).filter(x => x !== current.id); save(); }
            setTimeout(nextRound, 1300);
          } else {
            micResult.style.background = '#FF5C8A';
            micResult.style.color = '#fff';
            recordAnswer(false);
            const p = getProfile();
            if (p) { p.mistakes = p.mistakes || []; if (!p.mistakes.includes(current.id)) p.mistakes.push(current.id); save(); }
          }
        }
      }, () => { micBtn.classList.remove('recording'); micRec = null; }, 'en-US');
    });

    stageInner.appendChild(micBtn);
    stageInner.appendChild(micResult);
    stageInner.appendChild(el('div', { class: 'row gap-sm', style: { justifyContent: 'center', marginTop: '14px' } },
      el('button', { class: 'btn yellow sm', onclick: () => speak(current.en, 'en-US') }, '🔊 שמע'),
      el('button', { class: 'btn ghost sm', onclick: nextRound }, '⏭️ הבא')
    ));
  }

  nextRound();
  return wrap;
};

  const stats = p.stats || { questionsAnswered: 0, correct: 0 };
  const acc = stats.questionsAnswered > 0 ? Math.round(100 * stats.correct / stats.questionsAnswered) : 0;

  // Level + screen time hero card
  const heroCard = el('div', { class: 'card', style: { background: 'linear-gradient(135deg, #FFE9C7 0%, #FFD23F 100%)', textAlign: 'center', padding: '20px' } });
  heroCard.appendChild(el('div', { style: { fontSize: '48px' } }, '🌟'));
