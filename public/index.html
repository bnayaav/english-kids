    p.progression.pointsInLevel + ' / ' + POINTS_PER_LEVEL + ' נקודות לשלב הבא'
  ));
  // mini track
  const miniTrack = el('div', { class: 'prog-track', style: { marginTop: '8px', maxWidth: '200px', margin: '8px auto 0' } },
    el('div', { class: 'prog-fill', style: { width: ((p.progression.pointsInLevel / POINTS_PER_LEVEL) * 100) + '%' } })
  );
  heroCard.appendChild(miniTrack);
  wrap.appendChild(heroCard);

  // Screen time card
  const stCard = el('div', { class: 'card', style: { background: '#E8F4FF' } });
  stCard.appendChild(el('h3', {}, '⏱️ זמן מסך שהרוויח היום'));
  stCard.appendChild(el('div', { style: { fontSize: '32px', textAlign: 'center', margin: '8px 0', color: 'var(--blue)', fontFamily: '"Varela Round"', fontWeight: 'bold' } },
    p.progression.screenTime.earnedToday + ' / ' + MAX_DAILY_MINUTES + ' דקות'
  ));
  const stBar = el('div', { class: 'prog-track' },
    el('div', { class: 'prog-fill', style: { width: Math.min(100, (p.progression.screenTime.earnedToday / MAX_DAILY_MINUTES) * 100) + '%' } })
  );
  stCard.appendChild(stBar);
  if (p.progression.screenTime.earnedToday >= MAX_DAILY_MINUTES) {
    stCard.appendChild(el('p', { class: 'muted center', style: { marginTop: '8px', fontSize: '13px' } }, '🎉 מקסימום יומי הושג!'));
  } else {
    const nextLevelMins = levelRewardMinutes(p.progression.level + 1);
    const room = MAX_DAILY_MINUTES - p.progression.screenTime.earnedToday;
    const willGet = Math.min(nextLevelMins, room);
    stCard.appendChild(el('p', { class: 'muted center', style: { marginTop: '8px', fontSize: '13px' } },
      'שלב הבא יוסיף ' + willGet + ' דקות'
    ));

  const grid = el('div', { class: 'stats-grid' });
  grid.appendChild(el('div', { class: 'stat-card' },
    el('div', { class: 'num' }, p.progression.totalPoints || 0),
    el('div', { class: 'lbl' }, '⭐ סך נקודות')

    el('div', { class: 'lbl' }, '❓ שאלות שעניתי')

  ));

    wrap.appendChild(el('div', { class: 'card pop mt' },

      el('p', { class: 'muted' }, 'הקש על מילה כדי לשמוע אותה'),

          el('span', { class: 'v-en' }, v.en),

          el('span', { class: 'v-he' }, v.he),
          el('span', { style: { fontSize: '18px' } }, '🔊')

      el('button', { class: 'btn pink full mt', onclick: () => nav('game-mc', { onlyMistakes: true }) }, 'תרגל את כל המילים')
    ));

  return wrap;

/* ---------- vocab manager ---------- */
SCREENS['vocab'] = () => {
  const wrap = el('div');
  wrap.appendChild(backBtn(() => nav('parent-zone')));
  wrap.appendChild(el('h2', {}, '📖 בנק מילים'));

  const addCard = el('div', { class: 'card' });
  let newEn = '', newHe = '';
  addCard.appendChild(el('div', { class: 'field-row' },
    el('div', { class: 'field' },
      el('label', {}, 'אנגלית'),
      el('input', { class: 'eng-input', type: 'text', placeholder: 'apple', oninput: (e) => newEn = e.target.value })
    ),
    el('div', { class: 'field' },
      el('label', {}, 'עברית'),
      el('input', { type: 'text', placeholder: 'תפוח', oninput: (e) => newHe = e.target.value })
    )
  ));
  addCard.appendChild(el('button', {
    class: 'btn green full',
    onclick: () => {
      if (!newEn.trim() || !newHe.trim()) return alert('נא למלא את שני השדות');
      state.vocab.push({ id: uid(), en: newEn.trim().toLowerCase(), he: newHe.trim() });
      save();
      addCard.querySelectorAll('input').forEach(i => i.value = '');
      newEn = ''; newHe = '';
      refresh();
    }
  }, '+ הוסף מילה'));
  wrap.appendChild(addCard);

  const search = el('input', { type: 'text', placeholder: '🔍 חיפוש...', style: { width: '100%', padding: '12px', borderRadius: '14px', border: '3px solid #2D1B4E', fontFamily: 'Heebo', fontSize: '16px', marginBottom: '12px' }, oninput: (e) => refresh(e.target.value) });
  wrap.appendChild(search);

  const listBox = el('div');
  wrap.appendChild(listBox);

  function refresh(q = '') {
    listBox.innerHTML = '';
    const ql = q.toLowerCase();
    const filtered = state.vocab.filter(v => !q || v.en.includes(ql) || v.he.includes(q));
    filtered.forEach(v => {
      listBox.appendChild(el('div', { class: 'vocab-row' },
        el('span', { class: 'v-en', onclick: () => speak(v.en, 'en-US') }, v.en),
        el('span', { class: 'v-arrow' }, '←'),
        el('span', { class: 'v-he' }, v.he),
        el('button', { class: 'v-del', onclick: () => {
          if (!confirm('למחוק?')) return;
          state.vocab = state.vocab.filter(x => x.id !== v.id);
          save(); refresh(q);
        } }, '✕')
      ));
    });
    if (filtered.length === 0) {
      listBox.appendChild(el('p', { class: 'muted center' }, 'אין תוצאות'));
    }
  }
  refresh();
  return wrap;
};

/* =========================================================================
   BOOT
   ========================================================================= */
async function boot() {
  loadCfg();
  if (!cfg.apiUrl || !cfg.token) {
    state.screen = { name: 'setup', params: {} };
    render();
    return;
  }
  // Show loading screen
  root.innerHTML = '<div class="welcome"><div class="big-emoji">📚</div><p style="margin-top:14px">טוען נתונים מהענן...</p></div>';
  try {
    await load();
    if (state.profiles.length === 0) state.screen = { name: 'profile-select', params: {} };
    else if (!cfg.currentProfileId) state.screen = { name: 'profile-select', params: {} };
    else state.screen = { name: 'home', params: {} };
    render();
  } catch (e) {
    root.innerHTML = '';
    if (e.message.includes('סיסמה') || e.message.includes('401') || e.message.includes('Unauthorized')) {
      state.screen = { name: 'setup', params: { error: 'סיסמה שגויה - הזן שוב' } };
    } else {
      state.screen = { name: 'setup', params: { error: 'לא ניתן להתחבר: ' + e.message } };
    }
    render();
  }
}

boot();

// register service worker if available (for PWA install prompt)
if ('serviceWorker' in navigator) {
  const swCode = `
    self.addEventListener('install', (e) => self.skipWaiting());
    self.addEventListener('activate', (e) => self.clients.claim());
    self.addEventListener('fetch', (e) => {});
  `;
  const blob = new Blob([swCode], { type: 'application/javascript' });
  try { navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(() => {}); } catch (e) {}
}
