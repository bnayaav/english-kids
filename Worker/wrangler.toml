name = "english-kids-api"
main = "src/index.js"
compatibility_date = "2024-12-01"

# Route (optional - uncomment if you have a custom domain)
# routes = [
#   { pattern = "api.bnaya-av.workers.dev/*", custom_domain = false }
# ]

# R2 bucket - holds the video files
[[r2_buckets]]
binding = "VIDEOS"
bucket_name = "english-kids-videos"

# KV namespace - holds profiles, vocab, movie metadata
# Run: wrangler kv namespace create english-kids-state
# Then paste the ID here:
[[kv_namespaces]]
binding = "KV"
id = "REPLACE_WITH_YOUR_KV_ID"

# Set with: wrangler secret put AUTH_TOKEN
# (interactive prompt for password)
